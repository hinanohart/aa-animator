name: Feature request
description: Suggest a new capability or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        For open-ended ideas or discussion, please use [Discussions → Ideas](https://github.com/hinanohart/aa-animator/discussions/categories/ideas) instead.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you are hitting.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like the feature to work? CLI flag, API, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you tried.
    validations:
      required: false
